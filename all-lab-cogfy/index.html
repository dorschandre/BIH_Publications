document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:#0A0A0A;\n  --green:#22c55e;--green-l:#86efac;--rose:#f43f5e;--info:#5b8def;\n  --txt:#f5f3ff;--txt2:#d4cdf0;--txt3:#a99fd1;--txt4:#7d72b0;--txt5:#5a4f8a;\n  --border:#33246f;--border2:rgba(246,195,0,.35);\n  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;\n  --mono:'JetBrains Mono','IBM Plex Mono',ui-monospace,Menlo,monospace;\n}\n*{box-sizing:border-box;margin:0;padding:0}\nhtml,body{background:#050318;}\nbody{font-family:var(--font);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}\ndeck-stage:not(:defined){visibility:hidden}\n\n/* ── Slide canvas ── */\n.slide{width:100%;height:100%;position:relative;overflow:hidden;background:var(--bg-2);color:var(--txt);padding:92px 132px 86px;display:flex;flex-direction:column;}\n.slide.deep{background:var(--bg-0);}\n.halo{position:absolute;inset:0;pointer-events:none;}\n.halo-top{background:radial-gradient(ellipse 80% 58% at 50% 0%,rgba(246,195,0,.07),transparent 68%);}\n.halo-top-strong{background:radial-gradient(ellipse 88% 66% at 50% 0%,rgba(246,195,0,.11),transparent 70%);}\n.halo-side{background:radial-gradient(ellipse 55% 80% at 0% 50%,rgba(246,195,0,.06),transparent 62%);}\n\n/* ── Type ── */\n.eyebrow{font-size:19px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:14px;}\n.eyebrow::before{content:'';display:block;width:38px;height:2px;background:var(--gold);}\n.eyebrow.dim{color:var(--txt4);}\n.eyebrow.dim::before{background:var(--txt4);}\n.eyebrow.mono-s{font-family:var(--mono);font-size:14px;letter-spacing:3px;}\n\n.h-cover{font-size:clamp(68px,6.2vw,108px);font-weight:900;line-height:1.02;letter-spacing:-2px;}\n.h1{font-size:68px;font-weight:900;line-height:1.06;letter-spacing:-1.2px;}\n.h2{font-size:54px;font-weight:800;line-height:1.08;letter-spacing:-.9px;}\n.h3{font-size:28px;font-weight:700;line-height:1.2;}\n.lead{font-size:26px;font-weight:400;line-height:1.55;color:var(--txt2);}\n.body-t{font-size:21px;color:var(--txt3);line-height:1.6;}\n.gold{color:var(--gold);}\n.gold-l{color:var(--gold-l);}\n.grad{background:linear-gradient(135deg,#fff 0%,var(--gold-l) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}\n\n/* ── Layout ── */\n.head{display:flex;flex-direction:column;gap:16px;margin-bottom:40px;}\n.head.tight{margin-bottom:26px;}\n.grow{flex:1;display:flex;flex-direction:column;justify-content:center;}\n.center-all{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}\n.grid{display:grid;gap:18px;}\n.g2{grid-template-columns:1fr 1fr;}\n.g3{grid-template-columns:repeat(3,1fr);}\n.g4{grid-template-columns:repeat(4,1fr);}\n\n/* ── Card ── */\n.card{background:var(--bg-3);border:1px solid var(--border);border-radius:12px;padding:24px 26px;display:flex;flex-direction:column;gap:10px;position:relative;}\n.card.inset{background:var(--bg-4);}\n.card.focus{border-color:var(--border2);}\n.card .ct{font-size:22px;font-weight:700;color:var(--txt);line-height:1.2;}\n.card .cd{font-size:18px;color:var(--txt3);line-height:1.45;}\n.card.top::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;background:var(--gold);}\n\n.icon{width:48px;height:48px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:rgba(246,195,0,.10);border:1px solid var(--border2);color:var(--gold);flex:0 0 48px;}\n.icon svg{width:24px;height:24px;}\n.icon.dim{background:rgba(255,255,255,.04);border-color:var(--border);color:var(--txt3);}\n\n.badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 13px;border-radius:999px;background:rgba(246,195,0,.12);border:1px solid var(--border2);color:var(--gold-l);}\n.badge.dim{background:rgba(255,255,255,.05);border-color:var(--border);color:var(--txt3);}\n.badge.hyp{background:rgba(244,123,32,.08);border-color:rgba(244,123,32,.25);color:var(--orange-l);font-size:11px;letter-spacing:1px;}\n\n/* ── Domain chips ── */\n.domchip{display:flex;align-items:center;gap:11px;background:var(--bg-3);border:1px solid var(--border);border-radius:10px;padding:16px 22px;font-size:20px;font-weight:700;color:var(--txt2);}\n.domchip i{width:21px;height:21px;color:var(--gold);}\n.domchip.focus{background:var(--bg-4);border-color:var(--border2);color:var(--gold-l);}\n.domchip.focus i{color:var(--gold-l);}\n\n/* ── Mini tags ── */\n.minitag{display:inline-flex;align-items:center;font-size:16px;font-weight:600;color:var(--txt3);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:9px 16px;}\n.minitag.gold{border-color:var(--border2);color:var(--gold-l);background:rgba(246,195,0,.06);}\n\n/* ── Cycle phases ── */\n.cyc{background:var(--bg-3);border:1px solid var(--border);border-radius:14px;padding:26px 26px;display:flex;flex-direction:column;gap:14px;position:relative;}\n.cyc.focus{background:var(--bg-4);border-color:var(--border2);}\n.cyc-head{display:flex;align-items:center;gap:14px;}\n.cyc-n{font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:2px;color:var(--txt4);}\n.cyc-title{font-size:25px;font-weight:800;color:var(--txt);line-height:1.18;letter-spacing:-.3px;}\n.cyc.focus .cyc-title{color:var(--gold-l);}\n.cyc-list{list-style:none;display:flex;flex-direction:column;gap:9px;margin-top:2px;}\n.cyc-list li{font-size:17px;color:var(--txt3);padding-left:20px;position:relative;line-height:1.4;}\n.cyc-list li::before{content:'';position:absolute;left:0;top:8px;width:6px;height:6px;border-radius:50%;background:var(--gold-d);}\n.cyc.focus .cyc-list li::before{background:var(--gold);}\n\n/* ── Next steps ── */\n.nxt-item{background:var(--bg-3);border:1px solid var(--border);border-radius:13px;padding:20px 22px;display:flex;gap:18px;align-items:flex-start;}\n.nxt-item.focus{background:var(--bg-4);border-color:var(--border2);}\n.nxt-num{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--txt5);letter-spacing:1px;min-width:28px;}\n.nxt-body{display:flex;flex-direction:column;gap:5px;}\n.nxt-t{font-size:21px;font-weight:700;color:var(--txt);}\n.nxt-d{font-size:16px;color:var(--txt3);line-height:1.45;}\n\n/* ── Partnership columns ── */\n.lane{background:var(--bg-3);border:1px solid var(--border);border-radius:14px;padding:30px 28px;display:flex;flex-direction:column;gap:18px;min-height:330px;}\n.lane.focus{background:var(--bg-4);border-color:var(--border2);}\n.lane-tag{display:inline-flex;align-self:flex-start;font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt4);}\n.lane.focus .lane-tag{color:var(--gold);}\n.lane-t{font-size:30px;font-weight:800;color:var(--txt);line-height:1.12;letter-spacing:-.4px;}\n.lane.focus .lane-t{color:var(--gold-l);}\n.lane-list{list-style:none;display:flex;flex-direction:column;gap:11px;margin-top:4px;}\n.lane-list li{font-size:18px;color:var(--txt3);padding-left:22px;position:relative;line-height:1.4;}\n.lane-list li::before{content:'';position:absolute;left:0;top:9px;width:7px;height:7px;border-radius:2px;background:var(--gold-d);}\n.lane.focus .lane-list li::before{background:var(--gold);}\n\n/* ── Footer ── */\n.foot{position:absolute;left:132px;right:132px;bottom:38px;display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:13px;letter-spacing:1px;color:var(--txt5);text-transform:uppercase;}\n.foot .num{color:var(--txt4);}\n\n/* ── Presentation mode ── */\n#present-btn{position:fixed;top:18px;right:22px;z-index:9999;display:flex;align-items:center;gap:10px;background:var(--gold);color:var(--ink);font-family:var(--font);font-size:14px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;border:none;border-radius:10px;padding:11px 22px;cursor:pointer;transition:all .2s;box-shadow:0 4px 24px rgba(246,195,0,.28);}\n#present-btn:hover{background:var(--gold-l);transform:translateY(-1px);}\n#present-btn svg{width:16px;height:16px;}\n#exit-btn{position:fixed;bottom:28px;right:28px;z-index:9999;display:none;align-items:center;gap:10px;background:rgba(12,6,64,.9);color:var(--txt2);font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:1px solid var(--border);border-radius:10px;padding:10px 20px;cursor:pointer;transition:opacity .5s,color .2s;backdrop-filter:blur(14px);}\n#exit-btn:hover{color:var(--gold);border-color:var(--border2);opacity:1!important;}\n#exit-btn.fade{opacity:0;pointer-events:none;}\n#present-hint{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:9998;display:none;align-items:center;gap:14px;font-family:var(--mono);font-size:12px;color:var(--txt5);letter-spacing:1px;text-transform:uppercase;transition:opacity .5s;pointer-events:none;}\n#present-hint.fade{opacity:0;}\nbody.presenting #present-btn{display:none;}\nbody.presenting #exit-btn{display:flex;}\nbody.presenting #present-hint{display:flex;}\nbody.presenting{background:#000;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<deck-stage width=\"1920\" height=\"1080\">\n\n<!-- ════ 01 · CAPA ════ -->\n<section class=\"slide deep\" data-label=\"Capa\" data-screen-label=\"01\">\n  <div class=\"halo halo-top-strong\"><\u002Fdiv>\n  <div class=\"eyebrow mono-s\">IA APLICADA · ECOSSISTEMA IMOBILIÁRIO · ESPÍRITO SANTO<\u002Fdiv>\n  <div class=\"grow\" style=\"gap:28px;\">\n    <div class=\"h-cover grad\" style=\"max-width:1500px;\">ALL LAB Tec <span style=\"color:var(--txt4);-webkit-text-fill-color:var(--txt4);font-weight:700;\">×<\u002Fspan> Cogfy<\u002Fdiv>\n    <div class=\"lead\" style=\"max-width:1180px;font-size:30px;\">Inteligência artificial aplicada ao ecossistema <span class=\"gold\">imobiliário, privado e público<\u002Fspan> do Espírito Santo.<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:22px;margin-top:12px;\">\n    <div style=\"display:flex;align-items:center;gap:18px;font-family:var(--mono);font-size:17px;letter-spacing:1px;color:var(--txt3);\">\n      <span style=\"color:var(--gold-l);font-weight:700;\">ALL LAB TEC<\u002Fspan>\n      <span style=\"color:var(--txt5);\">·<\u002Fspan><span>VERTICAL TECNOLÓGICA DA FIVE URBAN PRIME<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:10px;\">\n      <span class=\"badge\">APRESENTAÇÃO EXTERNA<\u002Fspan>\n      <span class=\"badge dim\">CONVERSA EXPLORATÓRIA · 2026<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot\"><span>ALL LAB TEC × COGFY<\u002Fspan><span class=\"num\">01 / 13<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════ 02 · FIVE URBAN PRIME COMO HUB ════ -->\n<section class=\"slide\" data-label=\"Five Urban Prime como Hub\" data-screen-label=\"02\">\n  <div class=\"halo halo-top\"><\u002Fdiv>\n  <div class=\"head tight\">\n    <div class=\"eyebrow\">FIVE URBAN PRIME<\u002Fdiv>\n    <div class=\"h2\" style=\"max-width:1360px;\">Mais que um empreendimento — um <span class=\"gold-l\">hub de negócios<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"grow\" style=\"gap:24px;\">\n    <div class=\"lead\" style=\"max-width:1300px;\">A Five Urban Prime é a âncora de um ecossistema que conecta projetos, parceiros e oportunidades no Espírito Santo — e a tecnologia é uma de suas verticais.<\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:13px;align-content:center;\">\n      <div class=\"domchip\"><i data-lucide=\"building-2\"><\u002Fi>Imobiliário<\u002Fdiv>\n      <div class=\"domchip\"><i data-lucide=\"sparkles\"><\u002Fi>Experiências<\u002Fdiv>\n      <div class=\"domchip\"><i data-lucide=\"calendar-days\"><\u002Fi>Eventos<\u002Fdiv>\n      <div class=\"domchip\"><i data-lucide=\"zap\"><\u002Fi>Energia<\u002Fdiv>\n      <div class=\"domchip\"><i data-lucide=\"pen-tool\"><\u002Fi>Arquitetura<\u002Fdiv>\n      <div class=\"domchip\"><i data-lucide=\"truck\"><\u002Fi>Fornecedores<\u002Fdiv>\n      <div class=\"domchip\"><i data-lucide=\"trending-up\"><\u002Fi>Investidores<\u002Fdiv>\n      <div class=\"domchip\"><i data-lucide=\"landmark\"><\u002Fi>Setor público<\u002Fdiv>\n      <div class=\"domchip focus\"><i data-lucide=\"cpu\"><\u002Fi>Tecnologia<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot\"><span>FIVE URBAN PRIME COMO HUB<\u002Fspan><span class=\"num\">02 / 13<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════ 03 · ALL LAB TEC ════ -->\n<section class=\"slide deep\" data-label=\"ALL LAB Tec\" data-screen-label=\"03\">\n  <div class=\"halo halo-side\"><\u002Fdiv>\n  <div class=\"head tight\">\n    <div class=\"eyebrow\">ALL LAB TEC<\u002Fdiv>\n    <div class=\"h2\" style=\"max-width:1400px;\">A vertical tecnológica da Five Urban Prime<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"grow\" style=\"gap:30px;\">\n    <div class=\"h1\" style=\"max-width:1450px;font-size:46px;\">Criada para <span class=\"grad\">identificar, estruturar e viabilizar<\u002Fspan> soluções tecnológicas com valor econômico real.<\u002Fdiv>\n    <div class=\"grid g3\" style=\"gap:18px;\">\n      <div class=\"card\">\n        <div class=\"icon\"><i data-lucide=\"search\"><\u002Fi><\u002Fdiv>\n        <div class=\"ct\">Identificar<\u002Fdiv>\n        <div class=\"cd\">Mapear onde a tecnologia gera valor concreto dentro e fora do ecossistema Five.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"icon\"><i data-lucide=\"layout-grid\"><\u002Fi><\u002Fdiv>\n        <div class=\"ct\">Estruturar<\u002Fdiv>\n        <div class=\"cd\">Organizar oportunidades em casos de uso claros, testáveis e acompanháveis.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card focus top\">\n        <div class=\"icon\"><i data-lucide=\"rocket\"><\u002Fi><\u002Fdiv>\n        <div class=\"ct gold-l\">Viabilizar<\u002Fdiv>\n        <div class=\"cd\">Conectar mercado, parceiros de tecnologia e oportunidades para tirar soluções do papel.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot\"><span>ALL LAB TEC<\u002Fspan><span class=\"num\">03 / 13<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════ 04 · A OPORTUNIDADE ════ -->\n<section class=\"slide\" data-label=\"A Oportunidade\" data-screen-label=\"04\">\n  <div class=\"halo halo-top\"><\u002Fdiv>\n  <div class=\"head tight\">\n    <div class=\"eyebrow\">A OPORTUNIDADE<\u002Fdiv>\n    <div class=\"h2\" style=\"max-width:1400px;\">A IA deixa de ser apenas ferramenta operacional<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"grow\" style=\"gap:34px;\">\n    <div class=\"h1\" style=\"max-width:1480px;font-size:46px;\">Passa a ser uma <span class=\"grad\">camada de relacionamento e monetização<\u002Fspan> ao longo de todo o ciclo do negócio.<\u002Fdiv>\n    <div class=\"grid g5\" style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:16px;\">\n      <div class=\"card\" style=\"gap:14px;\"><div class=\"icon\"><i data-lucide=\"messages-square\"><\u002Fi><\u002Fdiv><div class=\"ct\" style=\"font-size:20px;\">Relacionamento<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"gap:14px;\"><div class=\"icon\"><i data-lucide=\"coins\"><\u002Fi><\u002Fdiv><div class=\"ct\" style=\"font-size:20px;\">Monetização<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"gap:14px;\"><div class=\"icon\"><i data-lucide=\"headset\"><\u002Fi><\u002Fdiv><div class=\"ct\" style=\"font-size:20px;\">Atendimento<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"gap:14px;\"><div class=\"icon\"><i data-lucide=\"bar-chart-3\"><\u002Fi><\u002Fdiv><div class=\"ct\" style=\"font-size:20px;\">Inteligência comercial<\u002Fdiv><\u002Fdiv>\n      <div class=\"card focus top\" style=\"gap:14px;\"><div class=\"icon\"><i data-lucide=\"repeat\"><\u002Fi><\u002Fdiv><div class=\"ct gold-l\" style=\"font-size:20px;\">Recorrência<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot\"><span>A OPORTUNIDADE<\u002Fspan><span class=\"num\">04 / 13<\u002Fs  <i data-lucide=\"flask-conical\" style=\"width:22px;height:22px;color:var(--gold);flex:0 0 22px;\"><\u002Fi>\n      <div class=\"body-t\" style=\"color:var(--txt2);\">Todos os pilotos são <span class=\"gold-l\">hipóteses a validar<\u002Fspan> — formatos, escopo e viabilidade serão definidos em conjunto.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot\"><span>POSSÍVEIS PILOTOS<\u002Fspan><span class=\"num\">11 / 13<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════ 12 · COMO IMAGINAMOS A PARCERIA ════ -->\n<section class=\"slide\" data-label=\"Como imaginamos a parceria\" data-screen-label=\"12\">\n  <div class=\"halo halo-top\"><\u002Fdiv>\n  <div class=\"head tight\">\n    <div class=\"eyebrow\">COMO IMAGINAMOS A PARCERIA<\u002Fdiv>\n    <div class=\"h2\" style=\"max-width:1400px;\">Papéis complementares, casos de uso construídos juntos<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"grow\">\n    <div class=\"grid g3\" style=\"gap:18px;align-items:stretch;\">\n      <div class=\"lane\">\n        <span class=\"lane-tag\">ALL LAB / FUP<\u002Fspan>\n        <div class=\"lane-t\">Estrutura e articulação<\u002Fdiv>\n        <ul class=\"lane-list\">\n          <li>Estrutura o mercado e o contexto<\u002Fli>\n          <li>Articula oportunidades reais<\u002Fli>\n          <li>Organiza e conduz os pilotos<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"lane\">\n        <span class=\"lane-tag\">COGFY<\u002Fspan>\n        <div class=\"lane-t\">Tecnologia e produto<\u002Fdiv>\n        <ul class=\"lane-list\">\n          <li>Tecnologia e produto<\u002Fli>\n          <li>Implantação e suporte<\u002Fli>\n          <li>Evolução das soluções<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"lane focus\">\n        <span class=\"lane-tag\">JUNTOS<\u002Fspan>\n        <div class=\"lane-t gold-l\">Casos de uso<\u002Fdiv>\n        <ul class=\"lane-list\">\n          <li>Constroem casos de uso<\u002Fli>\n          <li>Compartilham apre ><\u002Fdiv>\n      <div class=\"nxt-item\"><div class=\"nxt-num\">06<\u002Fdiv><div class=\"nxt-body\"><div class=\"nxt-t\">Avaliar formato de parceria<\u002Fdiv><div class=\"nxt-d\">Discutir como colaborar, sem fechar condições nesta etapa.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"nxt-item focus\" style=\"max-width:760px;\"><div class=\"nxt-num\" style=\"color:var(--gold);\">07<\u002Fdiv><div class=\"nxt-body\"><div class=\"nxt-t gold-l\">Marcar próxima reunião<\u002Fdiv><div class=\"nxt-d\">Definir a data do próximo encontro para avançar.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid var(--border);padding-top:22px;\">\n    <div style=\"display:flex;flex-direction:column;gap:4px;\">\n      <div class=\"grad\" style=\"font-size:20px;font-weight:900;letter-spacing:-.2px;\">ALL LAB TEC × COGFY<\u002Fdiv>\n      <div class=\"mono\" style=\"color:var(--txt5);font-size:12px;letter-spacing:1.5px;font-family:var(--mono);\">VERTICAL TECNOLÓGICA · FIVE URBAN PRIME · 2026<\u002Fdiv>\n    <\u002Fdiv>\n    <span class=\"badge\">CONVERSA EXPLORATÓRIA<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"foot\"><span>PRÓXIMOS PASSOS<\u002Fspan><span class=\"num\">13 / 13<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fdeck-stage>\n\n<script src=\"ea637079-60fd-42a2-baab-70f4fee66028\"><\u002Fscript>\n<script src=\"46b33345-5fa1-4109-8135-341635bc8572\"><\u002Fscript>\n<script>\n  function paintIcons(){if(window.lucide&&lucide.createIcons){lucide.createIcons();}}\n  if(window.lucide){paintIcons();}else{window.addEventListener('load',paintIcons);}\n  document.addEventListener('slidechange',()=>setTimeout(paintIcons,30));\n  setTimeout(paintIcons,300);setTimeout(paintIcons,900);\n<\u002Fscript>\n\n<button id=\"present-btn\" title=\"Modo apresentação (F)\">\n  <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polygon points=\"5 3 19 12 5 21 5 3\"><\u002Fpolygon><\u002Fsvg>\n  Apresentar\n<\u002Fbutton>\n<button id=\"exit-btn\" title=\"Sair da apresentação (Esc ou F)\">\n  <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg>\n  Sair da apresentação\n<\u002Fbutton>\n<div id=\"present-hint\">\n  <span>← → navegar<\u002Fspan><span style=\"color:var(--txt4)\">·<\u002Fspan>\n  <span>Espaço próximo<\u002Fspan><span style=\"color:var(--txt4)\">·<\u002Fspan>\n  <span>F fullscreen<\u002Fspan><span style=\"color:var(--txt4)\">·<\u002Fspan>\n  <span>Esc sair<\u002Fspan>\n<\u002Fdiv>\n\n<script>\n(function(){\n  var stage=document.querySelector('deck-stage');\n  var btnP=document.getElementById('present-btn');\n  var btnE=document.getElementById('exit-btn');\n  var hint=document.getElementById('present-hint');\n  var fadeTimer=null;\n  function resetFade(){\n    btnE.classList.remove('fade');hint.classList.remove('fade');\n    clearTimeout(fadeTimer);\n    fadeTimer=setTimeout(function(){btnE.classList.add('fade');hint.classList.add('fade');},3200);\n  }\n  function enterPresentation(){\n    stage.setAttribute('no-rail','');\n    document.body.classList.add('presenting');\n    var req=document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen;\n    if(req)req.call(document.documentElement).catch(function(){});\n    setTimeout(resetFade,400);\n  }\n  function exitPresentation(){\n    stage.removeAttribute('no-rail');\n    document.body.classList.remove('presenting');\n    clearTimeout(fadeTimer);\n    var ex=document.exitFullscreen||document.webkitExitFullscreen;\n    if(ex&&document.fullscreenElement)ex.call(document).catch(function(){});\n  }\n  btnP.addEventListener('click',enterPresentation);\n  btnE.addEventListener('click',exitPresentation);\n  document.addEventListener('fullscreenchange',function(){\n    if(!document.fullscreenElement&&document.body.classList.contains('presenting')){\n      stage.removeAttribute('no-rail');document.body.classList.remove('presenting');\n    }\n  });\n  document.addEventListener('webkitfullscreenchange',function(){\n    if(!document.webkitFullscreenElement&&document.body.classList.contains('presenting')){\n      stage.removeAttribute('no-rail');document.body.classList.remove('presenting');\n    }\n  });\n  document.addEventListener('mousemove',function(){if(document.body.classList.contains('presenting'))resetFade();});\n  document.addEventListener('keydown',function(e){\n    var tag=(e.target.tagName||'').toUpperCase();\n    if(tag==='INPUT'||tag==='TEXTAREA')return;\n    if((e.key==='f'||e.key==='F')&&!e.ctrlKey&&!e.metaKey&&!e.altKey){\n      document.body.classList.contains('presenting')?exitPresentation():enterPresentation();\n    }\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
